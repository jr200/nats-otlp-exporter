name: test

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

# Required by the ci_npmjs.yaml reusable workflow's size-limit job
# (gated on `run-size-limit` but permissions are validated upfront).
permissions:
  contents: read
  pull-requests: write

jobs:
  ci:
    uses: jr200-labs/github-action-templates/.github/workflows/ci_npmjs.yaml@master
    with:
      node-version: '22'
      pnpm-version: '10'
      run-integration: true

  lint-workflow-runners:
    uses: jr200-labs/github-action-templates/.github/workflows/lint_workflow_runners.yaml@master

  # JRL-30 drift check: re-run sync.sh against github-action-templates@master
  # and fail if any tracked synced file (e.g. .syncpackrc.yaml,
  # release-please-config.json) drifts from the canonical source.
  # Promote to a shared reusable workflow once the pattern proves out.
  shared-sync-drift:
    runs-on: ${{ fromJSON(vars.RUNNER_PROFILES)[vars.RUNNER_PROFILE].default }}
    steps:
      - uses: actions/checkout@v6

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
          yq --version

      - name: Bootstrap + run sync.sh
        run: |
          mkdir -p .shared
          curl -sfL --max-time 10 \
            "https://raw.githubusercontent.com/jr200-labs/github-action-templates/master/shared/sync.sh" \
            -o .shared/sync.sh
          chmod +x .shared/sync.sh
          .shared/sync.sh node

      - name: Fail on drift from canonical shared config
        run: |
          if ! git diff --exit-code -- .syncpackrc.yaml release-please-config.json; then
            echo "::error::Tracked synced files drifted from github-action-templates@master."
            echo "Run '.shared/sync.sh node' locally and commit the result, or edit .syncpackrc.local.yaml instead."
            exit 1
          fi
          echo "✓ No drift"
